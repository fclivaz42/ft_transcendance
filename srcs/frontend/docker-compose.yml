services:
  frontend-builder:
    build: ./
    container_name: frontend
    environment:
      - TZ=Europe/Zurich
    volumes:
      - sarif-frontend:/var/www/sarif-frontend
    networks:
      - reverse-proxy
    restart: on-failure

volumes:
  sarif-frontend:
    name: "sarif-frontend"
    driver: local

