<!DOCTYPE html>
<html>

<head>
  <title>SARIF's PONG</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./assets/tailwind.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script type="module" src="../dist/app.js"></script>
</head>

<body class="font-montserrat text-xs bg-gray-200">
  <div class="h-screen w-screen flex flex-col fixed">
    <header class="bg-primary p-2 flex justify-between align-middle">
      <div class="flex">
        <h1 class="text-lg my-auto h-fit font-bold">SARIF's PONG</h1>
      </div>
      <div class="flex gap-x-2" id="userMenu">
      </div>
    </header>
    <div class="flex h-full w-full pt-4 gap-x-4">
      <nav class="h-full w-fit flex delay-1000" id="navBar">
        <div class="flex flex-col justify-between w-fit">
          <div class="flex-col w-fit max-h-[80vh] overflow-y-auto scrollbar-thin">
            <a class="w-24 h-24 overflow-visible flex flex-col items-center justify-center gap-y-1" href="#" id="btnPong">
              <img class="h-8 w-8" src="./assets/ui/ping-pong-svgrepo-com.svg">
              <p class="text-nowrap">Pong Game</p>
            </a>
            <a class="w-24 h-24 overflow-visible flex flex-col items-center justify-center gap-y-1" href="#" id="btnBonusGame">
              <img class="h-8 w-8" src="./assets/ui/ping-pong-svgrepo-com.svg">
              <p class="text-nowrap">Bonus Game</p>
            </a>
            <a class="w-24 h-24 overflow-visible flex flex-col items-center justify-center gap-y-1" href="#">
              <img class="h-8 w-8" src="./assets/ui/leaderboard-svgrepo-com.svg">
              <p>Leaderboard</p>
            </a>
          </div>
          <div class="w-fit">
            <a class="w-24 h-24 overflow-visible flex flex-col items-center justify-center gap-y-1" href="#">
              <img class="h-8 w-8" src="./assets/ui/settings-svgrepo-com.svg">
              <p>Settings</p>
            </a>
          </div>
        </div>
      </nav>
      <main class="h-full w-full bg-white p-8">
        <div class="bg-red-200 h-full w-full">
        </div>
      </main>
    </div>
  </div>
</body>

</html>
