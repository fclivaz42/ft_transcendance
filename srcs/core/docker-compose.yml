services:
  core:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sarif.rule=Host(`sarif.ruinformatique.ch`)"
      - "traefik.http.routers.sarif.tls=true"
      - "traefik.http.services.sarif.loadbalancer.server.scheme=https"

    container_name: core
    networks:
      - reverse-proxy
    volumes:
      - ssl:/ssl
      - data:/data
      - sarif-libs:/libs
      - sarif-frontend:/var/www/sarif-frontend
    build:
      context: .
    env_file:
      - ../.env
      #- .env
    environment:
      - API_KEY
      - TZ=Europe/Zurich
    depends_on:
      libs:
        condition: service_completed_successfully
        restart: true
      frontend-builder:
        condition: service_completed_successfully
        restart: true
    restart: always
